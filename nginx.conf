# Proxy inverso MundoTec ERP (plantilla). Reemplaza los dominios y las IP permitidas.
# Tienda = pública con HTTPS. ERP = restringido por IP/VPN. Fiscal = nunca se expone.

# Límite de tasa para el camino público de la tienda (BFF)
limit_req_zone $binary_remote_addr zone=store_api:10m rate=10r/s;

# ---------- TIENDA (pública) ----------
server {
    listen 80;
    server_name tienda.midominio.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name tienda.midominio.com;
    ssl_certificate     /etc/letsencrypt/live/tienda.midominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tienda.midominio.com/privkey.pem;

    # Frontend de la tienda
    location / {
        proxy_pass http://web-store:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Capa pública/BFF: solo endpoints de comercio, con límite de tasa
    location /api/ {
        limit_req zone=store_api burst=20 nodelay;
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# ---------- ERP (interno / restringido) ----------
server {
    listen 443 ssl;
    server_name erp.midominio.com;
    ssl_certificate     /etc/letsencrypt/live/erp.midominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.midominio.com/privkey.pem;

    # Restringe el ERP a tu red/VPN. Ajusta las IP/rangos permitidos:
    allow 192.168.0.0/16;     # LAN
    allow 10.0.0.0/8;         # VPN (ejemplo)
    deny all;

    location / {
        proxy_pass http://web-erp:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
